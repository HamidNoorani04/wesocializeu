kind = "web"
previewPath = "/"
title = "WeSocializeU"
version = "1.0.0"
id = "artifacts/wesocializeu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21419

[services.development]
run = "pnpm --filter @workspace/wesocializeu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wesocializeu", "run", "build" ]
publicDir = "artifacts/wesocializeu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21419"
BASE_PATH = "/"
